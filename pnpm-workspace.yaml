packages:
  - "packages/*"
  - "vscode/*"
  - "dprint/*"

catalogMode: prefer
blockExoticSubdeps: true
minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - "@typescript/*"

catalog:
  "@changesets/cli": 2.31.0
  "@types/node": 25.9.2
  "@types/vscode": 1.120.0
  "@typescript/native-preview": 7.0.0-dev.20260608.1
  "@vscode/vsce": 3.9.2
  typescript: 6.0.3
  vite: npm:@voidzero-dev/vite-plus-core@0.1.24
  vitest: npm:@voidzero-dev/vite-plus-test@0.1.24
  vite-plus: 0.1.24

overrides:
  vite: "catalog:"
  vitest: "catalog:"

peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"

allowBuilds:
  "@vscode/vsce-sign": false
  keytar: false
